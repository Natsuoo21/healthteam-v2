version: '3.8'

services:
  healthteam-web:
    image: ghcr.io/natsuoo21/healthteam-v2:main
    container_name: healthteam-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - ./data/db:/app/prisma

  # O Watchtower vigia as imagens do GitHub e atualiza sozinho o healthteam
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 120 --cleanup healthteam-web
    restart: always
